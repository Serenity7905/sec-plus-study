<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>Sec+ Study · SY0-701</title>
<style>
/* System fonts that approximate JetBrains Mono and Fraunces */
:root {
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, "Roboto Mono", "Courier New", monospace;
  --font-serif: "New York", "Iowan Old Style", "Apple Garamond", Georgia, "Times New Roman", serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0e1a;
  --bg-2: #131829;
  --bg-3: #1a2138;
  --ink: #e8ecf5;
  --ink-2: #8d97b3;
  --ink-3: #5a6480;
  --accent: #7dd3c0;
  --accent-dim: #5fb8a3;
  --warn: #ffb86b;
  --danger: #ff6b8a;
  --info: #82a9ff;
  --success: #6ee7b7;
  --grid: rgba(125, 211, 192, 0.06);
}

html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}

body {
  background: var(--bg);
  background-image:
    radial-gradient(circle at 20% 10%, rgba(125, 211, 192, 0.08), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(255, 107, 138, 0.05), transparent 40%),
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 24px 24px, 24px 24px;
  color: var(--ink);
  font-family: var(--font-mono);
  display: flex;
  flex-direction: column;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  position: fixed;
  width: 100%;
  height: 100%;
}

/* ===== TOP BAR ===== */
.topbar {
  padding: 12px 18px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(125, 211, 192, 0.12);
}
.brand {
  font-family: var(--font-serif);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.02em;
  line-height: 1;
}
.brand em { font-style: italic; color: var(--accent); font-weight: 400; }
.brand .sub {
  display: block;
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 9px;
  color: var(--ink-2);
  letter-spacing: 0.2em;
  margin-top: 4px;
  text-transform: uppercase;
}
.home-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(125,211,192,0.2);
  color: var(--ink);
  padding: 8px 12px;
  border-radius: 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.home-btn svg { width: 12px; height: 12px; }
.home-btn:active { transform: scale(0.95); }
.home-btn.hidden { display: none; }

/* ===== SCREENS ===== */
.screen {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.screen.active { display: flex; }

/* ===== HOME SCREEN ===== */
.home {
  padding: 20px 18px 16px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.home-title {
  font-family: var(--font-serif);
  font-weight: 800;
  font-size: 32px;
  letter-spacing: -0.03em;
  line-height: 1.05;
  margin-bottom: 6px;
}
.home-title em { font-style: italic; color: var(--accent); font-weight: 400; }
.home-sub {
  font-size: 11px;
  color: var(--ink-2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.section-heading {
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 18px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-heading::before {
  content: "";
  width: 16px; height: 1px;
  background: var(--accent);
}

.deck-card {
  background: linear-gradient(160deg, var(--bg-2) 0%, #0d1220 100%);
  border: 1px solid rgba(125, 211, 192, 0.18);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}
.deck-card:active { transform: scale(0.98); }
.deck-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--accent);
}
.deck-card.crypto::before { background: var(--info); }
.deck-card.attacks::before { background: var(--danger); }
.deck-card.controls::before { background: var(--warn); }
.deck-card.abbr::before { background: linear-gradient(180deg, var(--accent), var(--info)); }

/* Study mode toggle */
.mode-toggle {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 6px;
}
.mode-opt {
  background: linear-gradient(160deg, var(--bg-2) 0%, #0d1220 100%);
  border: 1px solid rgba(125, 211, 192, 0.18);
  border-radius: 14px;
  padding: 12px 14px;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
  color: var(--ink);
  position: relative;
  overflow: hidden;
}
.mode-opt:active { transform: scale(0.98); }
.mode-opt.active {
  border-color: var(--accent);
  background: linear-gradient(160deg, rgba(125,211,192,0.1) 0%, rgba(125,211,192,0.02) 100%);
}
.mode-opt.active::after {
  content: "✓";
  position: absolute;
  top: 12px;
  right: 14px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 13px;
}
.mode-title {
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.01em;
  margin-bottom: 3px;
}
.mode-desc {
  font-size: 11px;
  color: var(--ink-2);
  line-height: 1.4;
  padding-right: 28px;
}

.deck-name {
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 18px;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}
.deck-meta {
  font-size: 10px;
  color: var(--ink-2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.deck-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.mini-btn {
  flex: 1;
  background: rgba(125,211,192,0.08);
  border: 1px solid rgba(125,211,192,0.25);
  color: var(--accent);
  padding: 10px;
  border-radius: 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.mini-btn:active { transform: scale(0.96); }
.mini-btn.quiz {
  background: rgba(255,184,107,0.08);
  border-color: rgba(255,184,107,0.3);
  color: var(--warn);
}
.mini-btn svg { width: 12px; height: 12px; }

/* ===== STATS PANEL ===== */
.stats-panel {
  background: linear-gradient(160deg, rgba(125,211,192,0.06) 0%, rgba(130,169,255,0.04) 100%);
  border: 1px solid rgba(125, 211, 192, 0.15);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 6px;
}
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.stat {
  text-align: center;
}
.stat-num {
  font-family: var(--font-serif);
  font-weight: 800;
  font-size: 24px;
  color: var(--accent);
  line-height: 1;
}
.stat-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-2);
  margin-top: 4px;
}

/* ===== FILTER PILLS ===== */
.filter-row {
  padding: 10px 14px 8px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  border-bottom: 1px solid rgba(125, 211, 192, 0.08);
  flex-shrink: 0;
}
.filter-row::-webkit-scrollbar { display: none; }

.pill {
  flex-shrink: 0;
  padding: 7px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(125,211,192,0.2);
  color: var(--ink-2);
  font-size: 10px;
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s ease;
}
.pill:active { transform: scale(0.95); }
.pill.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

/* ===== PROGRESS BAR ===== */
.progress {
  height: 2px;
  background: rgba(255,255,255,0.05);
  position: relative;
  flex-shrink: 0;
}
.progress-bar {
  position: absolute;
  inset: 0 auto 0 0;
  background: var(--accent);
  width: 0%;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.counter-row {
  padding: 6px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  color: var(--ink-2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  flex-shrink: 0;
}
.counter-row b { color: var(--ink); font-weight: 700; }

/* ===== FLASHCARD DECK ===== */
.deck-area {
  flex: 1;
  position: relative;
  perspective: 1500px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 14px;
  overflow: hidden;
}
.fc {
  width: 100%;
  max-width: 380px;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
}
.fc.flipped { transform: rotateY(180deg); }

.face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 18px;
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  background: linear-gradient(160deg, var(--bg-2) 0%, #0d1220 100%);
  border: 1px solid rgba(125, 211, 192, 0.2);
  box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(125,211,192,0.05) inset;
  overflow: hidden;
  transition: opacity 0.3s ease;
}
.face::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(180deg, rgba(125,211,192,0.08), transparent);
  pointer-events: none;
}
.face.back { transform: rotateY(180deg); }
.fc:not(.flipped) .face.back { opacity: 0; pointer-events: none; }
.fc.flipped .face.front { opacity: 0; pointer-events: none; }

.tag-row {
  display: flex;
  gap: 6px;
  align-items: center;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-2);
  z-index: 1;
  flex-wrap: wrap;
}
.tag-row .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
}
.proto-badge {
  padding: 4px 9px;
  border-radius: 20px;
  background: rgba(125, 211, 192, 0.12);
  color: var(--accent);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  border: 1px solid rgba(125, 211, 192, 0.3);
}
.proto-badge.tcp { background: rgba(125,211,192,0.12); color: var(--accent); border-color: rgba(125,211,192,0.3); }
.proto-badge.udp { background: rgba(255,184,107,0.12); color: var(--warn); border-color: rgba(255,184,107,0.3); }
.proto-badge.both { background: rgba(255,107,138,0.12); color: var(--danger); border-color: rgba(255,107,138,0.3); }
.domain-badge {
  padding: 4px 9px;
  border-radius: 20px;
  background: rgba(130, 169, 255, 0.1);
  color: var(--info);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  border: 1px solid rgba(130, 169, 255, 0.25);
  margin-left: auto;
}

/* Category row: OSI layer + service type badges, prominent on the front of port cards */
.cat-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
  z-index: 1;
}
.cat-pill {
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.cat-pill.layer {
  background: linear-gradient(135deg, rgba(125,211,192,0.15), rgba(130,169,255,0.15));
  color: var(--accent);
  border: 1px solid rgba(125,211,192,0.3);
}
.cat-pill.service {
  background: rgba(255,184,107,0.1);
  color: var(--warn);
  border: 1px solid rgba(255,184,107,0.25);
}
.security-flag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  margin-top: 10px;
  align-self: flex-start;
  z-index: 1;
}
.security-flag.secure { background: rgba(125,211,192,0.1); color: var(--accent); border: 1px solid rgba(125,211,192,0.3); }
.security-flag.insecure { background: rgba(255,107,138,0.1); color: var(--danger); border: 1px solid rgba(255,107,138,0.3); }
.security-flag::before {
  content: "";
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.port-display { margin-top: 16px; z-index: 1; }
.port-num {
  font-family: var(--font-serif);
  font-weight: 800;
  font-size: clamp(56px, 18vw, 88px);
  line-height: 1;
  letter-spacing: -0.05em;
  padding-bottom: 0.1em;
  background: linear-gradient(180deg, var(--ink) 0%, #6b7593 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.port-label {
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--ink-2);
  text-transform: uppercase;
  margin-top: 6px;
}
.proto-name {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 600;
  font-size: 28px;
  color: var(--accent);
  margin-top: 14px;
  letter-spacing: -0.01em;
  z-index: 1;
}
.proto-full {
  font-size: 13px;
  color: var(--ink-2);
  margin-top: 4px;
  font-weight: 500;
  z-index: 1;
}
.pair-hint {
  margin-top: 8px;
  font-size: 10px;
  color: var(--ink-2);
  letter-spacing: 0.1em;
  z-index: 1;
}
.pair-hint .arrow { color: var(--accent); margin: 0 6px; }
.pair-hint .partner { color: var(--ink); font-weight: 700; }
.tap-hint {
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: var(--ink-2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  z-index: 1;
}
.tap-hint .arrow {
  display: inline-block;
  animation: bounce 1.5s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(4px); }
}
.deco-line {
  position: absolute;
  bottom: 56px;
  left: 18px;
  right: 18px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(125,211,192,0.4), transparent);
}

/* Concept card front (no port) */
.concept-front {
  display: flex;
  flex-direction: column;
  height: 100%;
  z-index: 1;
}
.concept-name {
  font-family: var(--font-serif);
  font-weight: 800;
  font-size: clamp(34px, 9vw, 48px);
  line-height: 1;
  letter-spacing: -0.03em;
  margin-top: 18px;
  background: linear-gradient(180deg, var(--ink) 0%, #6b7593 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.concept-sub {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 600;
  font-size: 18px;
  color: var(--accent);
  margin-top: 10px;
  line-height: 1.3;
}

/* Abbreviation card front — compact, acronym-focused */
.abbr-front {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  z-index: 1;
  padding: 20px 0;
}
.abbr-letters {
  font-family: var(--font-serif);
  font-weight: 800;
  font-size: clamp(64px, 18vw, 96px);
  line-height: 1;
  letter-spacing: -0.04em;
  background: linear-gradient(180deg, var(--accent) 0%, var(--info) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.abbr-expand {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 600;
  font-size: 16px;
  color: var(--ink);
  margin-top: 14px;
  line-height: 1.35;
  letter-spacing: -0.005em;
}
.abbr-full-line {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 600;
  font-size: 14px;
  color: var(--accent);
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(125,211,192,0.15);
  line-height: 1.4;
}

/* Back face */
.back-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-bottom: 1px solid rgba(125,211,192,0.2);
  padding-bottom: 10px;
  margin-bottom: 12px;
}
.back-title {
  font-family: var(--font-serif);
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.02em;
}
.back-port {
  font-size: 11px;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 0.1em;
}
.back-content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-right: 4px;
}
.back-content::-webkit-scrollbar { width: 3px; }
.back-content::-webkit-scrollbar-thumb { background: rgba(125,211,192,0.3); border-radius: 2px; }
.section { margin-bottom: 14px; }
.section-label {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-label::before {
  content: "";
  width: 14px; height: 1px;
  background: var(--accent);
}
.section-text {
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink);
}
.section-text strong { color: var(--accent); font-weight: 700; }
.scenario {
  background: rgba(125,211,192,0.06);
  border-left: 2px solid var(--accent);
  padding: 10px 12px;
  border-radius: 0 8px 8px 0;
  font-size: 12.5px;
  line-height: 1.55;
}
.scenario .pre {
  display: block;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
  font-weight: 700;
}
.exam-tip {
  background: rgba(255, 184, 107, 0.07);
  border-left: 2px solid var(--warn);
  padding: 10px 12px;
  border-radius: 0 8px 8px 0;
  font-size: 12px;
  line-height: 1.5;
  margin-top: 10px;
}
.exam-tip .pre {
  display: block;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--warn);
  margin-bottom: 6px;
  font-weight: 700;
}

/* Hidden answer + blurred terms for self-quiz on back */
.hidden-answer {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 0;
  letter-spacing: 0.04em;
  user-select: none;
  -webkit-user-select: none;
  transition: color 0.2s ease;
}
.hidden-answer:active { transform: scale(0.98); }
.hidden-answer .reveal-tag {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(125,211,192,0.1);
  border: 1px solid rgba(125,211,192,0.3);
  padding: 4px 8px;
  border-radius: 12px;
}
.hidden-answer.revealed {
  color: var(--ink);
  font-family: var(--font-serif);
  font-style: normal;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.02em;
}

.blur-word {
  display: inline-block;
  background: rgba(125,211,192,0.15);
  color: transparent;
  border-radius: 4px;
  padding: 0 6px;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.25s ease;
  user-select: none;
  -webkit-user-select: none;
}
.blur-word.revealed {
  background: rgba(125,211,192,0.08);
  color: var(--accent);

/* ===== CONTROLS ===== */
.controls {
  padding: 10px 14px 12px;

  gap: 8px;
  border-top: 1px solid rgba(125, 211, 192, 0.1);
  flex-shrink: 0;
}
.btn {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(125,211,192,0.2);
  color: var(--ink);
  padding: 13px 10px;
  border-radius: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn:active {
  transform: scale(0.96);
  background: rgba(125,211,192,0.1);
}
.btn.primary {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}
.btn.primary:active { background: var(--accent-dim); }
.btn svg { width: 14px; height: 14px; }
.btn:disabled { opacity: 0.4; pointer-events: none; }

/* ===== QUIZ MODE ===== */
.quiz-area {
  flex: 1;
  padding: 14px 18px 18px;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.quiz-area::-webkit-scrollbar { width: 3px; }
.quiz-area::-webkit-scrollbar-thumb { background: rgba(125,211,192,0.3); border-radius: 2px; }

.quiz-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  color: var(--ink-2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 14px;
  position: sticky;
  top: 0;
  background: var(--bg);
  padding: 4px 0;
  z-index: 2;
}
.quiz-meta b { color: var(--ink); font-weight: 700; }
.quiz-meta .score { color: var(--accent); }

.question {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: 18px;
  line-height: 1.4;
  letter-spacing: -0.01em;
  margin-bottom: 18px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.question em {
  display: block;
  font-style: italic;
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 8px;
}

.choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(125,211,192,0.15);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  font-size: 14px;
  line-height: 1.45;
  text-align: left;
  color: var(--ink);
  font-family: var(--font-mono);
}
.choice:active { transform: scale(0.98); }
.choice .letter {
  flex-shrink: 0;
  width: 26px; height: 26px;
  border-radius: 8px;
  background: rgba(125,211,192,0.1);
  border: 1px solid rgba(125,211,192,0.3);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
}
.choice.correct {
  background: rgba(110, 231, 183, 0.12);
  border-color: var(--success);
}
.choice.correct .letter {
  background: var(--success);
  color: var(--bg);
  border-color: var(--success);
}
.choice.wrong {
  background: rgba(255, 107, 138, 0.1);
  border-color: var(--danger);
}
.choice.wrong .letter {
  background: var(--danger);
  color: var(--bg);
  border-color: var(--danger);
}
.choice.disabled { pointer-events: none; }

.explanation {
  background: rgba(255, 184, 107, 0.07);
  border-left: 2px solid var(--warn);
  padding: 12px 14px;
  border-radius: 0 8px 8px 0;
  font-size: 12.5px;
  line-height: 1.55;
  margin-top: 18px;
  display: none;
}
.explanation.show { display: block; }
.explanation .pre {
  display: block;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--warn);
  margin-bottom: 6px;
  font-weight: 700;
}

.quiz-result {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  text-align: center;
}
.result-num {
  font-family: var(--font-serif);
  font-weight: 800;
  font-size: 80px;
  line-height: 1;
  background: linear-gradient(180deg, var(--accent) 0%, var(--info) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.04em;
}
.result-frac {
  font-family: var(--font-serif);
  font-size: 18px;
  color: var(--ink-2);
  margin-top: 4px;
}
.result-msg {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 18px;
  color: var(--accent);
  margin-top: 18px;
  max-width: 280px;
  line-height: 1.4;
}
.result-actions {
  display: flex;
  gap: 10px;
  margin-top: 28px;
  width: 100%;
  max-width: 320px;
}

/* ===== EMPTY STATE ===== */
.empty {
  text-align: center;
  color: var(--ink-2);
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 40px 20px;
  margin: auto;
}

@media (max-height: 720px) {
  .port-num { font-size: clamp(48px, 14vw, 76px); }

  .face { padding: 16px 14px; }
  .home-title { font-size: 26px; }

  .choice { padding: 12px 14px; font-size: 13px; }

@keyframes cardIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* ============ ANIMATION PACK ============ */

/* Ambient pulse on the accent dot */
@keyframes pulseDot {
  0%, 100% { box-shadow: 0 0 10px var(--accent), 0 0 0 0 rgba(125,211,192,0.4); }
  50% { box-shadow: 0 0 14px var(--accent), 0 0 0 6px rgba(125,211,192,0); }
}
.tag-row .dot { animation: pulseDot 2s ease-in-out infinite; }

/* Subtle floating brand glow on home */
@keyframes brandGlow {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(125,211,192,0.2)); }
  50% { filter: drop-shadow(0 0 16px rgba(125,211,192,0.5)); }
}
.home-title em { animation: brandGlow 3s ease-in-out infinite; }

/* Stat counter pop-in */
@keyframes statPop {
  0% { opacity: 0; transform: scale(0.5); }
  60% { transform: scale(1.15); }
  100% { opacity: 1; transform: scale(1); }
}
.stat-num { animation: statPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

/* Stagger deck card entry */
@keyframes deckSlideIn {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}
.deck-card {
  opacity: 0;
  animation: deckSlideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
.deck-card:nth-child(1) { animation-delay: 0.05s; }
.deck-card:nth-child(2) { animation-delay: 0.15s; }
.deck-card:nth-child(3) { animation-delay: 0.25s; }
.deck-card:nth-child(4) { animation-delay: 0.35s; }
.deck-card:nth-child(5) { animation-delay: 0.45s; }

/* Mode option entry */
.mode-opt {
  opacity: 0;
  animation: deckSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
.mode-opt:nth-child(1) { animation-delay: 0.1s; }
.mode-opt:nth-child(2) { animation-delay: 0.2s; }

/* Progress bar shimmer */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.progress-bar {
  background-image: linear-gradient(90deg, var(--accent) 0%, #aef0e0 50%, var(--accent) 100%);
  background-size: 200% 100%;
  animation: shimmer 2s linear infinite;
}

/* Port number reveal animation */
@keyframes portReveal {
  0% { opacity: 0; letter-spacing: 0.1em; transform: translateY(10px); }
  100% { opacity: 1; letter-spacing: -0.05em; transform: translateY(0); }
}
.port-num { animation: portReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

/* Concept name fade-in */
@keyframes nameSlide {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
.concept-name { animation: nameSlide 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.1s both; }
.concept-sub { animation: nameSlide 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.25s both; }

/* Button press feedback */
@keyframes btnRipple {
  to { box-shadow: 0 0 0 12px rgba(125,211,192,0); }
}
.btn.primary:active { animation: btnRipple 0.4s ease-out; }

/* ===== STREAK COUNTER ===== */
.streak-display {
  position: fixed;
  top: calc(env(safe-area-inset-top) + 60px);
  right: 14px;
  background: linear-gradient(135deg, rgba(255,184,107,0.95), rgba(255,107,138,0.95));
  color: #0a0e1a;
  padding: 8px 14px;
  border-radius: 20px;
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 6px 24px -4px rgba(255,184,107,0.4);
  z-index: 100;
  opacity: 0;
  transform: translateY(-10px) scale(0.9);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
.streak-display.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.streak-display .flame {
  font-size: 16px;
  animation: flameFlicker 1.2s ease-in-out infinite;
  display: inline-block;
}
@keyframes flameFlicker {
  0%, 100% { transform: scale(1) rotate(-2deg); }
  50% { transform: scale(1.15) rotate(2deg); }
}
.streak-display.bump { animation: streakBump 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes streakBump {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-4px) scale(1.1); }
}

/* ===== MILESTONE TOAST ===== */
.milestone-toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  background: linear-gradient(160deg, var(--bg-2) 0%, #0d1220 100%);
  border: 2px solid var(--accent);
  border-radius: 20px;
  padding: 28px 36px;
  text-align: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  box-shadow: 0 20px 60px -10px rgba(125,211,192,0.5);
  min-width: 260px;
}
.milestone-toast.show {
  animation: milestoneIn 2.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes milestoneIn {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3) rotate(-10deg); }
  15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1) rotate(2deg); }
  25% { transform: translate(-50%, -50%) scale(1) rotate(0); }
  85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
}
.milestone-emoji {
  font-size: 56px;
  display: block;
  margin-bottom: 10px;
  animation: emojiSpin 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes emojiSpin {
  0% { transform: scale(0) rotate(-180deg); }
  100% { transform: scale(1) rotate(0); }
}
.milestone-title {
  font-family: var(--font-serif);
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.02em;
  color: var(--accent);
  margin-bottom: 6px;
}
.milestone-sub {
  font-size: 12px;
  color: var(--ink-2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ===== CONFETTI ===== */
.confetti-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 999;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 10px;
  height: 14px;
  top: -20px;
  opacity: 0;
}
.confetti-piece.go { animation: confettiFall 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
}

/* ===== ANIMATED SCORE COUNTER ===== */
.result-num {
  animation: scoreCountUp 1.2s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes scoreCountUp {
  0% { opacity: 0; transform: scale(0.3); }
  50% { transform: scale(1.15); }
  100% { opacity: 1; transform: scale(1); }
}
.result-frac {
  animation: nameSlide 0.5s ease-out 0.6s both;
}
.result-msg {
  animation: nameSlide 0.6s ease-out 0.9s both;
}
.result-actions {
  animation: nameSlide 0.6s ease-out 1.1s both;
}

/* ===== CORRECT / WRONG FEEDBACK PULSE ===== */
@keyframes correctPulse {
  0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(110,231,183,0.5); }
  50% { transform: scale(1.02); box-shadow: 0 0 0 8px rgba(110,231,183,0); }
  100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(110,231,183,0); }
}
.choice.correct { animation: correctPulse 0.6s ease-out; }

@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.choice.wrong { animation: wrongShake 0.4s ease-in-out; }

/* ===== FLIP ENHANCEMENT ===== */
.fc {
  transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
}
.fc:active:not(.flipped) { transform: scale(0.99); }
.fc.flipped:active { transform: rotateY(180deg) scale(0.99); }

/* ===== BLUR REVEAL ===== */
.blur-word {
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.blur-word.revealed {
  animation: revealPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes revealPop {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* ===== Hover shimmer on deck cards ===== */
.deck-card { position: relative; overflow: hidden; }
.deck-card::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 80%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(125,211,192,0.06), transparent);
  transition: left 0.8s ease;
  pointer-events: none;
}
.deck-card:active::after { left: 120%; }

/* Reduce motion if user prefers */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

let currentFilter = "All";
let filteredCards = [];
let cardIdx = 0;
let studyMode = "term-first"; // or "def-first"

// Animation / motivation state
let sessionStreak = 0;
let lastSeenIdx = -1;

// Quiz state
let quizPool = [];
let quizIdx = 0;
let quizScore = 0;
let quizAnswered = false;

// Persistent stats — uses localStorage so it works in any browser
async function loadStats() {
  try {
    const v = localStorage.getItem("secplus_stats");
    return v ? JSON.parse(v) : { quizzesTaken: 0, bestScore: null, totalCardsViewed: 0 };
  } catch { return { quizzesTaken: 0, bestScore: null, totalCardsViewed: 0 }; }
}
async function saveStats(s) {
  try { localStorage.setItem("secplus_stats", JSON.stringify(s)); } catch {}
}
async function loadMode() {
  try {
    return localStorage.getItem("secplus_mode") || "term-first";
  } catch { return "term-first"; }
}
async function saveMode(m) {
  try { localStorage.setItem("secplus_mode", m); } catch {}
}

// ============ STREAK + MILESTONE + CONFETTI ============
function showStreak() {
  const el = document.getElementById("streakDisplay");
  document.getElementById("streakNum").textContent = sessionStreak;
  el.classList.add("show", "bump");
  setTimeout(() => el.classList.remove("bump"), 500);
}
function hideStreak() {
  document.getElementById("streakDisplay").classList.remove("show");
}

function showMilestone(emoji, title, sub) {
  const toast = document.getElementById("milestoneToast");
  document.getElementById("milestoneEmoji").textContent = emoji;
  document.getElementById("milestoneTitle").textContent = title;
  document.getElementById("milestoneSub").textContent = sub;
  toast.classList.remove("show");
  void toast.offsetWidth;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2500);
}

function checkMilestone(n) {
  const milestones = {
    5: { emoji: "✨", title: "Warming up!", sub: "5 cards reviewed" },
    10: { emoji: "🎯", title: "Great focus!", sub: "10 cards reviewed" },
    25: { emoji: "🚀", title: "On fire!", sub: "25 cards reviewed" },
    50: { emoji: "💎", title: "Diamond mind!", sub: "50 cards reviewed" },
    100: { emoji: "🏆", title: "Centurion!", sub: "100 cards reviewed" },
    131: { emoji: "👑", title: "All cards!", sub: "Full deck mastered" }
  };
  if (milestones[n]) {
    const m = milestones[n];
    showMilestone(m.emoji, m.title, m.sub);
    if (n >= 25) launchConfetti(n >= 100 ? 80 : 40);
  }
}

function launchConfetti(count = 50) {
  const container = document.getElementById("confettiContainer");
  const colors = ["#7dd3c0", "#ffb86b", "#ff6b8a", "#82a9ff", "#6ee7b7"];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = Math.random() * 100 + "%";
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = (Math.random() * 0.4) + "s";
    piece.style.animationDuration = (2.5 + Math.random() * 1.5) + "s";
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) piece.style.borderRadius = "50%";
    container.appendChild(piece);
    requestAnimationFrame(() => piece.classList.add("go"));
    setTimeout(() => piece.remove(), 4000);
  }
}

async function recordCardView() {
  sessionStreak++;
  showStreak();
  const stats = await loadStats();
  stats.totalCardsViewed = (stats.totalCardsViewed || 0) + 1;
  await saveStats(stats);
  checkMilestone(sessionStreak);
}

// ============ HOME SCREEN ============
async function renderHome() {
  const totalCards = Object.values(decks).reduce((sum, d) => sum + d.cards.length, 0);
  document.getElementById("statTotal").textContent = totalCards;
  
  const stats = await loadStats();
  document.getElementById("statBest").textContent = stats.bestScore !== null ? stats.bestScore + "%" : "—";
  document.getElementById("statQuizzes").textContent = stats.quizzesTaken;

  const list = document.getElementById("deckList");
  list.innerHTML = "";
  Object.entries(decks).forEach(([key, deck]) => {
    const cardEl = document.createElement("div");
    cardEl.className = "deck-card " + (key === "crypto" ? "crypto" : key === "attacks" ? "attacks" : key === "controls" ? "controls" : key === "abbr" ? "abbr" : "");
    cardEl.innerHTML = `
      <div class="deck-name">${deck.name}</div>
      <div class="deck-meta">${deck.description}</div>
      <div class="deck-actions">
        <button class="mini-btn" data-action="study" data-key="${key}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Study
        </button>
        <button class="mini-btn quiz" data-action="quiz" data-key="${key}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Quiz
        </button>
      </div>
    `;
    list.appendChild(cardEl);
  });

  list.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", e => {
      const action = btn.dataset.action;
      const key = btn.dataset.key;
      if (action === "study") openDeck(key);
      else if (action === "quiz") openQuiz(key);
    });
  });

  // Load and apply saved mode
  studyMode = await loadMode();
  document.querySelectorAll(".mode-opt").forEach(opt => {
    opt.classList.toggle("active", opt.dataset.mode === studyMode);
  });

  // Wire up mode toggle
  document.querySelectorAll(".mode-opt").forEach(opt => {
    opt.onclick = async () => {
      studyMode = opt.dataset.mode;
      document.querySelectorAll(".mode-opt").forEach(o => o.classList.remove("active"));
      opt.classList.add("active");
      await saveMode(studyMode);
    };
  });
}

// ============ NAVIGATION ============
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.getElementById("homeBtn").classList.toggle("hidden", id === "screenHome");
  // Reset quiz controls visibility when entering quiz screen
  if (id === "screenQuiz") {
    const qc = document.getElementById("quizControls");
    if (qc) qc.style.display = "";
  }
}

function goHome() {
  showScreen("screenHome");
  document.getElementById("brandSub").textContent = "SY0-701 · v3";
  sessionStreak = 0;
  hideStreak();
  renderHome();
}
document.getElementById("homeBtn").addEventListener("click", goHome);

// ============ FLASHCARD MODE ============
function openDeck(key) {
  currentDeck = decks[key];
  currentFilter = "All";
  filteredCards = [...currentDeck.cards];
  cardIdx = 0;
  document.getElementById("brandSub").textContent = "Flashcards · " + currentDeck.name;
  document.getElementById("deckLabel").textContent = currentDeck.name;
  buildFilters();
  showScreen("screenCards");
  renderFlashcard();
}

function buildFilters() {
  const row = document.getElementById("filterRow");
  row.innerHTML = "";
  currentDeck.domains.forEach(d => {
    const pill = document.createElement("div");
    pill.className = "pill" + (d === currentFilter ? " active" : "");
    pill.textContent = d;
    pill.addEventListener("click", () => {
      currentFilter = d;
      filteredCards = d === "All" ? [...currentDeck.cards] : currentDeck.cards.filter(c => c.domain === d);
      cardIdx = 0;
      buildFilters();
      renderFlashcard();
    });
    row.appendChild(pill);
  });
}

function protoClass(p) {
  if (p === "TCP") return "tcp";
  if (p === "UDP") return "udp";
  return "both";
}

function renderFlashcard() {
  const fc = document.getElementById("fc");
  const front = document.getElementById("front");
  const back = document.getElementById("back");
  const counter = document.getElementById("curIdx");
  const total = document.getElementById("totIdx");
  const progress = document.getElementById("progressBar");

  if (filteredCards.length === 0) {
    front.innerHTML = '<div class="empty">No cards in this category</div>';
    back.innerHTML = "";
    counter.textContent = 0;
    total.textContent = 0;
    progress.style.width = "0%";
    return;
  }

  const c = filteredCards[cardIdx];
  total.textContent = filteredCards.length;
  counter.textContent = cardIdx + 1;
  progress.style.width = ((cardIdx + 1) / filteredCards.length * 100) + "%";

  // Build the "term face" — shows the protocol/concept/abbreviation name
  let termFaceHTML;
  if (currentDeck.type === "ports") {
    const cls = protoClass(c.proto);
    termFaceHTML = `
      <div class="tag-row">
        <span class="dot"></span>
        <span>card ${String(cardIdx+1).padStart(2,'0')}</span>
        <span class="proto-badge ${cls}">${c.proto}</span>
      </div>
      <div class="cat-row">
        <span class="cat-pill layer">${c.layer || 'L7'} · APPLICATION</span>
        <span class="cat-pill service">${c.domain}</span>
      </div>
      ${c.security === 'both' ? '' : `<div class="security-flag ${c.security}">${c.security === 'secure' ? 'ENCRYPTED' : 'CLEARTEXT'}</div>`}
      <div class="port-display">
        <div class="port-num">${c.port}</div>
        <div class="port-label">port number</div>
      </div>
      <div class="proto-name">${c.name}</div>
      <div class="proto-full">${c.full}</div>
      ${c.pair ? `<div class="pair-hint">pair<span class="arrow">→</span><span class="partner">${c.pair}</span></div>` : ""}
      <div class="deco-line"></div>
      <div class="tap-hint"><span>tap to ${studyMode === 'term-first' ? 'reveal definition' : 'see term'}</span><span class="arrow">→</span></div>
    `;
  } else if (currentDeck.type === "abbr") {
    termFaceHTML = `
      <div class="tag-row">
        <span class="dot"></span>
        <span>card ${String(cardIdx+1).padStart(2,'0')}</span>
        <span class="domain-badge">${c.domain}</span>
      </div>
      <div class="abbr-front">
        <div class="abbr-letters">${c.abbr}</div>
        <div class="abbr-expand">${c.full}</div>
      </div>
      <div class="deco-line"></div>
      <div class="tap-hint"><span>tap to ${studyMode === 'term-first' ? 'see meaning' : 'reveal acronym'}</span><span class="arrow">→</span></div>
    `;
  } else {
    termFaceHTML = `
      <div class="tag-row">
        <span class="dot"></span>
        <span>card ${String(cardIdx+1).padStart(2,'0')}</span>
        <span class="domain-badge">${c.domain}</span>
      </div>
      ${c.security === 'both' ? '' : `<div class="security-flag ${c.security}">${c.security === 'secure' ? 'SECURE' : 'INSECURE'}</div>`}
      <div class="concept-front">
        <div class="concept-name">${c.name}</div>
        <div class="concept-sub">${c.sub}</div>
      </div>
      <div class="deco-line"></div>
      <div class="tap-hint"><span>tap to ${studyMode === 'term-first' ? 'reveal definition' : 'see term'}</span><span class="arrow">→</span></div>
    `;
  }

  // Build the "definition face" — shows meaning/scenario/exam tip
  // In def-first mode, the term gets blurred so user can guess. In term-first, the term is revealed.
  const isDefFirst = studyMode === "def-first";
  const cardLabel = currentDeck.type === "abbr" ? c.abbr : c.name;
  const headerExtra = currentDeck.type === "ports" ? `<div class="back-port">:${c.port}</div>`
                    : currentDeck.type === "abbr" ? `<div class="back-port">${c.domain.toUpperCase()}</div>`
                    : `<div class="back-port">${c.domain.toUpperCase()}</div>`;
  const headerHTML = isDefFirst
    ? `<div class="back-header"><div class="back-title hidden-answer" data-answer="${cardLabel}${currentDeck.type === 'ports' ? ' :' + c.port : ''}">??? <span class="reveal-tag">tap to reveal</span></div></div>`
    : `<div class="back-header"><div class="back-title">${cardLabel}</div>${headerExtra}</div>`;

  const blurIfNeeded = (txt) => isDefFirst
    ? txt.replace(new RegExp(escapeRegex(cardLabel), 'gi'), '<span class="blur-word">▒▒▒</span>')
    : txt;

  let definitionFaceHTML;
  if (currentDeck.type === "abbr") {
    // Compact layout for abbreviations: just expansion, meaning, sample
    definitionFaceHTML = `
      ${headerHTML}
      <div class="back-content">
        ${!isDefFirst ? `<div class="abbr-full-line">${c.full}</div>` : ''}
        <div class="section">
          <div class="section-label">Meaning</div>
          <div class="section-text">${blurIfNeeded(c.meaning)}</div>
        </div>
        <div class="scenario">
          <span class="pre">Sample / Real Use</span>
          ${blurIfNeeded(c.sample)}
        </div>
      </div>
    `;
  } else {
    definitionFaceHTML = `
      ${headerHTML}
      <div class="back-content">
        <div class="section">
          <div class="section-label">Meaning</div>
          <div class="section-text">${blurIfNeeded(c.meaning)}</div>
        </div>
        <div class="scenario">
          <span class="pre">Real-world Scenario</span>
          ${blurIfNeeded(c.scenario)}
        </div>
        <div class="exam-tip">
          <span class="pre">SY0-701 Exam Tip</span>
          ${blurIfNeeded(c.examTip)}
        </div>
      </div>
    `;
  }

  // Assign faces based on study mode
  if (studyMode === "term-first") {
    front.innerHTML = termFaceHTML;
    back.innerHTML = definitionFaceHTML;
  } else {
    front.innerHTML = definitionFaceHTML;
    back.innerHTML = termFaceHTML;
  }

  fc.classList.remove("flipped", "entering");
  void fc.offsetWidth;
  fc.classList.add("entering");

  // Wire up reveal button on whichever face has it (def-first mode shows it on FRONT)
  const hiddenAnswer = document.querySelector(".hidden-answer");
  if (hiddenAnswer) {
    hiddenAnswer.addEventListener("click", e => {
      e.stopPropagation();
      hiddenAnswer.textContent = hiddenAnswer.dataset.answer;
      hiddenAnswer.classList.add("revealed");
      document.querySelectorAll(".blur-word").forEach(w => w.classList.add("revealed"));
    });
  }
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function flipFC() { document.getElementById("fc").classList.toggle("flipped"); }

function snapToUnflipped() {
  // Instantly reset the card to its unflipped state without a visible animation
  const fc = document.getElementById("fc");
  if (!fc.classList.contains("flipped")) return;
  fc.style.transition = "none";
  fc.classList.remove("flipped");
  // Force reflow so the change applies before re-enabling transitions
  void fc.offsetWidth;
  // Re-enable transitions on the next frame so future flips animate normally
  requestAnimationFrame(() => {
    fc.style.transition = "";
  });
}

function nextFC() {
  if (filteredCards.length === 0) return;
  snapToUnflipped();
  cardIdx = (cardIdx + 1) % filteredCards.length;
  renderFlashcard();
  recordCardView();
}
function prevFC() {
  if (filteredCards.length === 0) return;
  snapToUnflipped();
  cardIdx = (cardIdx - 1 + filteredCards.length) % filteredCards.length;
  renderFlashcard();
}

document.getElementById("flipBtn").addEventListener("click", e => { e.stopPropagation(); flipFC(); });
document.getElementById("nextBtn").addEventListener("click", e => { e.stopPropagation(); nextFC(); });
document.getElementById("prevBtn").addEventListener("click", e => { e.stopPropagation(); prevFC(); });

const fcEl = document.getElementById("fc");
fcEl.addEventListener("click", flipFC);
let startX = 0, startY = 0;
fcEl.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
}, { passive: true });
fcEl.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - startX;
  const dy = e.changedTouches[0].clientY - startY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) nextFC(); else prevFC();
  }
}, { passive: true });

// ============ QUIZ MODE ============
function openQuiz(key) {
  currentDeck = decks[key];
  document.getElementById("brandSub").textContent = "Quiz · " + currentDeck.name;
  // Build a 10-question quiz from random cards
  const pool = [...currentDeck.cards].sort(() => Math.random() - 0.5).slice(0, Math.min(10, currentDeck.cards.length));
  quizPool = pool.map(c => buildQuizQuestion(c, currentDeck));
  quizIdx = 0;
  quizScore = 0;
  quizAnswered = false;
  showScreen("screenQuiz");
  renderQuizQuestion();
}

function buildQuizQuestion(card, deck) {
  let question, correct, distractors;
  const allCards = deck.cards;

  // Abbreviations deck: simpler quiz - pick abbr→meaning or expansion→abbr
  if (deck.type === "abbr") {
    const abbrTypes = ["expansion", "meaning", "reverse"];
    const t = abbrTypes[Math.floor(Math.random() * abbrTypes.length)];
    if (t === "expansion") {
      question = `What does <strong>${card.abbr}</strong> stand for?`;
      correct = card.full;
      distractors = allCards.filter(c => c.abbr !== card.abbr).sort(() => Math.random() - 0.5).slice(0, 3).map(c => c.full);
    } else if (t === "reverse") {
      question = `Which acronym is short for <em>"${card.full}"</em>?`;
      correct = card.abbr;
      distractors = allCards.filter(c => c.abbr !== card.abbr).sort(() => Math.random() - 0.5).slice(0, 3).map(c => c.abbr);
    } else {
      const meaningPlain = card.meaning.replace(/<[^>]+>/g, "");
      question = `Which abbreviation matches this description?<br><br>"${meaningPlain}"`;
      correct = card.abbr;
      distractors = allCards.filter(c => c.abbr !== card.abbr).sort(() => Math.random() - 0.5).slice(0, 3).map(c => c.abbr);
    }
    const choices = [correct, ...distractors].sort(() => Math.random() - 0.5);
    return {
      question, correct, choices,
      explanation: `<strong>${card.abbr}</strong> = <em>${card.full}</em> — ${card.meaning.replace(/<[^>]+>/g, "")}`
    };
  }

  // Pick a question type for ports/concepts
  const types = ["definition", "scenario"];
  if (deck.type === "ports") types.push("port");
  const type = types[Math.floor(Math.random() * types.length)];

  if (type === "port" && deck.type === "ports") {
    question = `Which port is used by <strong>${card.name}</strong>?`;
    correct = card.port;
    distractors = allCards.filter(c => c.port !== card.port).sort(() => Math.random() - 0.5).slice(0, 3).map(c => c.port);
  } else if (type === "definition") {
    if (deck.type === "ports") {
      question = `Which protocol runs on port <strong>${card.port}</strong>?`;
      correct = card.name;
      distractors = allCards.filter(c => c.name !== card.name).sort(() => Math.random() - 0.5).slice(0, 3).map(c => c.name);
    } else {
      const meaningPlain = card.meaning.replace(/<[^>]+>/g, "");
      question = `Which concept matches this description?<br><br>"${meaningPlain}"`;
      correct = card.name;
      distractors = allCards.filter(c => c.name !== card.name).sort(() => Math.random() - 0.5).slice(0, 3).map(c => c.name);
    }
  } else {
    const scenPlain = card.scenario.replace(/<[^>]+>/g, "").replace(/`/g, "");
    question = `<em>Scenario</em>${scenPlain}<br><br>Which ${deck.type === "ports" ? "protocol" : "concept"} is involved?`;
    correct = card.name;
    distractors = allCards.filter(c => c.name !== card.name).sort(() => Math.random() - 0.5).slice(0, 3).map(c => c.name);
  }

  const choices = [correct, ...distractors].sort(() => Math.random() - 0.5);
  return { question, correct, choices, explanation: `<strong>${card.name}</strong> ${deck.type === "ports" ? `(port ${card.port})` : `· ${card.sub || card.full || ""}`} — ${card.examTip}` };
}

function renderQuizQuestion() {
  const area = document.getElementById("quizArea");
  const progress = document.getElementById("quizProgress");
  const nextBtn = document.getElementById("quizNextBtn");

  progress.style.width = ((quizIdx) / quizPool.length * 100) + "%";

  if (quizIdx >= quizPool.length) {
    return showQuizResult();
  }

  const q = quizPool[quizIdx];
  quizAnswered = false;

  area.innerHTML = `
    <div class="quiz-meta">
      <span>question <b>${quizIdx + 1}</b> / ${quizPool.length}</span>
      <span class="score">score: <b>${quizScore}</b></span>
    </div>
    <div class="question">${q.question}</div>
    <div class="choices">
      ${q.choices.map((c, idx) => `
        <button class="choice" data-choice="${c.replace(/"/g, '&quot;')}">
          <span class="letter">${String.fromCharCode(65 + idx)}</span>
          <span>${c}</span>
        </button>
      `).join("")}
    </div>
    <div class="explanation" id="explanation">
      <span class="pre">Why</span>
      <span id="explanationText"></span>
    </div>
  `;

  nextBtn.disabled = true;
  nextBtn.innerHTML = quizIdx === quizPool.length - 1
    ? `Finish <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
    : `Next <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;

  area.querySelectorAll(".choice").forEach(btn => {
    btn.addEventListener("click", () => handleChoice(btn, q));
  });
}

function handleChoice(btn, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const picked = btn.dataset.choice;
  const correct = picked === q.correct;
  if (correct) quizScore++;

  document.querySelectorAll(".choice").forEach(c => {
    c.classList.add("disabled");
    if (c.dataset.choice === q.correct) c.classList.add("correct");
    else if (c === btn && !correct) c.classList.add("wrong");
  });

  document.getElementById("explanationText").innerHTML = q.explanation;
  document.getElementById("explanation").classList.add("show");
  document.getElementById("quizNextBtn").disabled = false;

  // Update score display
  const scoreEl = document.querySelector(".quiz-meta .score");
  if (scoreEl) scoreEl.innerHTML = `score: <b>${quizScore}</b>`;
}

document.getElementById("quizNextBtn").addEventListener("click", () => {
  quizIdx++;
  renderQuizQuestion();
});

async function showQuizResult() {
  const area = document.getElementById("quizArea");
  const progress = document.getElementById("quizProgress");
  const total = quizPool.length;
  const pct = Math.round(quizScore / total * 100);
  progress.style.width = "100%";

  let msg, emoji;
  if (pct >= 90) { msg = "Outstanding. You're exam-ready on this topic."; emoji = "🏆"; }
  else if (pct >= 75) { msg = "Solid. A few weak spots to review."; emoji = "🎯"; }
  else if (pct >= 60) { msg = "Decent — flip through the flashcards once more."; emoji = "💪"; }
  else { msg = "Keep grinding. Review the deck, then retake."; emoji = "📚"; }

  area.innerHTML = `
    <div class="quiz-result">
      <div style="font-size: 48px; margin-bottom: 10px;">${emoji}</div>
      <div class="result-num" id="resultNumAnim">0%</div>
      <div class="result-frac">${quizScore} / ${total}</div>
      <div class="result-msg">${msg}</div>
      <div class="result-actions">
        <button class="btn" id="retakeBtn">Retake</button>
        <button class="btn primary" id="reviewBtn">Review Deck</button>
      </div>
    </div>
  `;
  document.getElementById("quizControls").style.display = "none";

  // Animate the percentage counting up
  const numEl = document.getElementById("resultNumAnim");
  let current = 0;
  const duration = 1200;
  const startTime = performance.now();
  function tick(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // Ease-out cubic
    const eased = 1 - Math.pow(1 - progress, 3);
    current = Math.round(pct * eased);
    numEl.textContent = current + "%";
    if (progress < 1) requestAnimationFrame(tick);
    else numEl.textContent = pct + "%";
  }
  requestAnimationFrame(tick);

  // Confetti for passing scores
  if (pct >= 75) {
    setTimeout(() => launchConfetti(pct >= 90 ? 80 : 50), 400);
  }
  // Milestone for perfect score
  if (pct === 100) {
    setTimeout(() => showMilestone("🏆", "PERFECT!", "100% — flawless"), 1400);
  }

  // Save stats
  const stats = await loadStats();
  stats.quizzesTaken++;
  const isNewBest = stats.bestScore === null || pct > stats.bestScore;
  if (isNewBest) stats.bestScore = pct;
  await saveStats(stats);

  if (isNewBest && stats.quizzesTaken > 1) {
    setTimeout(() => showMilestone("⭐", "New best!", `${pct}% — personal record`), 1800);
  }

  document.getElementById("retakeBtn").addEventListener("click", () => {
    document.getElementById("quizControls").style.display = "";
    const key = Object.keys(decks).find(k => decks[k] === currentDeck);
    openQuiz(key);
  });
  document.getElementById("reviewBtn").addEventListener("click", () => {
    document.getElementById("quizControls").style.display = "";
    const key = Object.keys(decks).find(k => decks[k] === currentDeck);
    openDeck(key);
  });
}

// ============ INIT ============
renderHome();
</script>
</body>
</html>
